<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Регистрация - DeliFood</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="app-shell">
      <section class="login-page">
        <div class="login-card">
          <div class="brand-row">
            <span class="brand-logo">D</span>
            <div>
              <h1>Регистрация</h1>
              <p>Создайте аккаунт, чтобы войти и оформить заказ</p>
            </div>
          </div>

          <form id="registerForm" class="form-grid">
            <label>
              Номер телефона
              <input id="phone" type="tel" placeholder="Введите номер телефона" required />
            </label>
            <label>
              Пароль
              <input id="password" type="password" placeholder="Введите пароль (минимум 6 символов)" required />
            </label>
            <label>
              Подтвердите пароль
              <input id="confirmPassword" type="password" placeholder="Введите пароль еще раз" required />
            </label>
            <label>
              Имя (необязательно)
              <input id="name" type="text" placeholder="Введите имя" />
            </label>
            <button type="submit" class="btn btn-primary">Зарегистрироваться</button>
          </form>
          <p class="hint auth-switch">
            Уже есть аккаунт? <a href="./index.html">Войти</a>
          </p>
        </div>
      </section>
    </div>

    <script src="./api.js"></script>
    <script src="./register.js"></script>
  </body>
</html>
